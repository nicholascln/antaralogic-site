<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
  }

  canvas { display: block; }

  /* Language toggle */
  .lang-toggle {
    position: fixed;
    top: 20px;
    right: 25px;
    z-index: 20;
    opacity: 0;
    animation: fadeInTitle 2s ease 1s forwards;
  }

  .lang-toggle button {
    background: none;
    border: 1px solid rgba(196, 149, 106, 0.2);
    color: rgba(196, 149, 106, 0.4);
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-left: 4px;
  }

  .lang-toggle button:hover,
  .lang-toggle button.active {
    color: rgba(196, 149, 106, 0.85);
    border-color: rgba(196, 149, 106, 0.5);
  }

  /* Manifesto statement */
  .manifesto {
    position: fixed;
    top: 55%;
    left: 0;
    right: 0;
    transform: translateY(-100%);
    text-align: center;
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    animation: fadeInTitle 3s ease 2s forwards;
    padding: 0 30px;
    margin-bottom: 15px;
  }

  .manifesto p {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 16px;
    color: rgba(196, 149, 106, 0.55);
    letter-spacing: 3px;
    line-height: 1.8;
  }

  .branding-block {
    position: fixed;
    top: 53%;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 10;
    pointer-events: none;
  }

  .logo-container {
    opacity: 0;
    animation: fadeInLogo 4s ease 3s forwards;
    margin-bottom: 14px;
  }

  .logo-container img {
    height: 144px;
    width: auto;
    filter: drop-shadow(0 0 30px rgba(196, 149, 106, 0.3));
    animation: logoGlow 4s ease-in-out infinite;
  }

  @keyframes logoGlow {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(196, 149, 106, 0.2)); }
    50% { filter: drop-shadow(0 0 40px rgba(196, 149, 106, 0.4)); }
  }

  .tagline {
    opacity: 0;
    animation: fadeInTitle 3s ease 5s forwards;
    margin-bottom: 18px;
  }

  .tagline p {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 20px;
    color: rgba(196, 149, 106, 0.75);
    letter-spacing: 5px;
    text-align: center;
  }

  .coming-soon {
    opacity: 0;
    animation: fadeInTitle 2s ease 7s forwards;
  }

  .coming-soon p {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 16px;
    color: rgba(196, 149, 106, 0.55);
    letter-spacing: 6px;
    text-transform: uppercase;
    text-align: center;
    transition: color 0.3s ease;
    padding: 12px 20px;
    border: 1px solid rgba(196, 149, 106, 0.15);
    border-radius: 3px;
    display: inline-block;
  }

  .coming-soon a:hover p {
    color: rgba(196, 149, 106, 0.8);
    border-color: rgba(196, 149, 106, 0.4);
  }

  .signature {
    position: fixed;
    bottom: 18px;
    left: 0; right: 0; text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    color: rgba(196, 149, 106, 0.45);
    letter-spacing: 2px;
    z-index: 10;
    opacity: 0;
    animation: fadeInTitle 2s ease 8s forwards;
  }

  @keyframes fadeInLogo {
    0% { opacity: 0; transform: scale(0.95); }
    100% { opacity: 1; transform: scale(1); }
  }

  @keyframes fadeInTitle {
    to { opacity: 1; }
  }
</style>

<body>
<canvas id="canvas"></canvas>

<div class="lang-toggle">
  <button id="btnEN" class="active" onclick="setLang('en')">EN</button>
  <button id="btnBM" onclick="setLang('bm')">BM</button>
</div>

<div class="manifesto">
  <p id="manifesto-text">We gave the world the internet. Then smartphones. Then AI.<br>All of it, built for one voice. None of it, built for the conversation.</p>
</div>

<div class="branding-block">
  <div class="logo-container">
    <img id="logoImg" alt="AntaraLogic®">
  </div>
  <div class="tagline">
    <p id="tagline-text">The Collective Intelligence Infrastructure</p>
  </div>
  <div class="coming-soon">
    <a href="story.html" onclick="this.href='story.html'+(currentLang==='bm'?'#bm':'')" style="text-decoration: none; cursor: pointer; pointer-events: auto;">
      <p id="learnmore-text" style="transition: color 0.3s ease;">Learn More</p>
    </a>
  </div>
</div>

<div class="signature" id="sig"></div>
<script>
const d = new Date();
const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const monthsBM = ['Januari','Februari','Mac','April','Mei','Jun','Julai','Ogos','September','Oktober','November','Disember'];
let currentLang = 'en';

const content = {
  en: {
    manifesto: 'We gave the world the internet. Then smartphones. Then AI.<br>All of it, built for one voice. None of it, built for the conversation.',
    tagline: 'The Collective Intelligence Infrastructure',
    learnMore: 'Learn More',
    sig: function(d) { return 'Claude Opus 4.6 \u2022 ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear() + ' \u2022 For AntaraLogic\u00AE'; }
  },
  bm: {
    manifesto: 'Kita berikan dunia internet. Kemudian telefon pintar. Kemudian AI.<br>Semuanya, dibina untuk seorang. Tiada satu pun, dibina untuk sesama kita.',
    tagline: 'Infrastruktur Kecerdasan Kolektif',
    learnMore: 'Ketahui Lebih Lanjut',
    sig: function(d) { return 'Claude Opus 4.6 \u2022 ' + d.getDate() + ' ' + monthsBM[d.getMonth()] + ' ' + d.getFullYear() + ' \u2022 Untuk AntaraLogic\u00AE'; }
  }
};

function setLang(lang) {
    window.location.hash = lang === 'bm' ? 'bm' : '';
  currentLang = lang;
  document.getElementById('manifesto-text').innerHTML = content[lang].manifesto;
  document.getElementById('tagline-text').textContent = content[lang].tagline;
  document.getElementById('learnmore-text').textContent = content[lang].learnMore;
  document.getElementById('sig').textContent = content[lang].sig(d);
  document.getElementById('btnEN').classList.toggle('active', lang === 'en');
  document.getElementById('btnBM').classList.toggle('active', lang === 'bm');
}

// Initialize
document.getElementById('sig').textContent = content.en.sig(d);
  if (window.location.hash === '#bm') { setLang('bm'); }
</script>

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  // Reinitialize fragments on resize
  initFragments();
}
window.addEventListener('resize', resize);

const COPPER = { r: 196, g: 149, b: 106 };
const DEEP_AMBER = { r: 180, g: 120, b: 60 };
const COLD_BLUE = { r: 140, g: 160, b: 200 };
const VOID = { r: 10, g: 10, b: 18 };

class ContextFragment {
  constructor(centerX, centerY) {
    this.cx = centerX;
    this.cy = centerY;
    this.angle = Math.random() * Math.PI * 2;
    this.radius = 60 + Math.random() * 120;
    this.speed = 0.002 + Math.random() * 0.004;
    this.size = 1 + Math.random() * 2.5;
    this.brightness = 0.3 + Math.random() * 0.7;
    this.pulse = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.01 + Math.random() * 0.02;
    this.isMemory = Math.random() > 0.85;
    if (this.isMemory) {
      this.size *= 1.8;
      this.brightness = 0.8 + Math.random() * 0.2;
    }
  }
  update() {
    this.angle += this.speed;
    this.pulse += this.pulseSpeed;
  }
  draw(ctx, t) {
    const x = this.cx + Math.cos(this.angle) * this.radius;
    const y = this.cy + Math.sin(this.angle) * (this.radius * 0.6);
    const alpha = this.brightness * (0.5 + 0.5 * Math.sin(this.pulse));
    ctx.beginPath();
    ctx.arc(x, y, this.size, 0, Math.PI * 2);
    if (this.isMemory) {
      const grad = ctx.createRadialGradient(x, y, 0, x, y, this.size * 3);
      grad.addColorStop(0, `rgba(${COPPER.r}, ${COPPER.g}, ${COPPER.b}, ${alpha})`);
      grad.addColorStop(1, `rgba(${COPPER.r}, ${COPPER.g}, ${COPPER.b}, 0)`);
      ctx.fillStyle = grad;
      ctx.arc(x, y, this.size * 3, 0, Math.PI * 2);
    } else {
      ctx.fillStyle = `rgba(${COPPER.r}, ${COPPER.g}, ${COPPER.b}, ${alpha * 0.7})`;
    }
    ctx.fill();
  }
}

class Dust {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.15;
    this.vy = -0.1 - Math.random() * 0.2;
    this.size = 0.5 + Math.random() * 1;
    this.alpha = 0.05 + Math.random() * 0.15;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.y < -10) { this.y = H + 10; this.x = Math.random() * W; }
    if (this.x < -10) this.x = W + 10;
    if (this.x > W + 10) this.x = -10;
  }
  draw(ctx) {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${COPPER.r}, ${COPPER.g}, ${COPPER.b}, ${this.alpha})`;
    ctx.fill();
  }
}

function drawFigure(ctx, x, y, scale, color, lean, breathe, isDeep) {
  const b = Math.sin(breathe) * 2;
  const leanX = lean * 8;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  
  const glowRadius = isDeep ? 80 : 50;
  const glowGrad = ctx.createRadialGradient(0, -40, 0, 0, -40, glowRadius);
  glowGrad.addColorStop(0, `rgba(${color.r}, ${color.g}, ${color.b}, 0.08)`);
  glowGrad.addColorStop(1, `rgba(${color.r}, ${color.g}, ${color.b}, 0)`);
  ctx.beginPath();
  ctx.arc(0, -40, glowRadius, 0, Math.PI * 2);
  ctx.fillStyle = glowGrad;
  ctx.fill();
  
  ctx.beginPath();
  ctx.arc(leanX * 0.3, -90 + b * 0.3, 14, 0, Math.PI * 2);
  const headGrad = ctx.createRadialGradient(leanX * 0.3, -92 + b * 0.3, 2, leanX * 0.3, -90 + b * 0.3, 14);
  headGrad.addColorStop(0, `rgba(${color.r}, ${color.g}, ${color.b}, 0.6)`);
  headGrad.addColorStop(1, `rgba(${color.r}, ${color.g}, ${color.b}, 0.15)`);
  ctx.fillStyle = headGrad;
  ctx.fill();
  
  ctx.beginPath();
  ctx.moveTo(leanX * 0.25 - 3, -76 + b * 0.3);
  ctx.lineTo(leanX * 0.2 - 5, -65 + b * 0.2);
  ctx.lineTo(leanX * 0.2 + 5, -65 + b * 0.2);
  ctx.lineTo(leanX * 0.25 + 3, -76 + b * 0.3);
  ctx.fillStyle = `rgba(${color.r}, ${color.g}, ${color.b}, 0.25)`;
  ctx.fill();
  
  ctx.beginPath();
  ctx.moveTo(leanX * 0.2 - 18, -65 + b * 0.2);
  ctx.quadraticCurveTo(leanX * 0.5, -35 + b, leanX * 0.3 - 14, -5);
  ctx.lineTo(leanX * 0.3 + 14, -5);
  ctx.quadraticCurveTo(leanX * 0.5, -35 + b, leanX * 0.2 + 18, -65 + b * 0.2);
  ctx.closePath();
  const torsoGrad = ctx.createLinearGradient(0, -65, 0, -5);
  torsoGrad.addColorStop(0, `rgba(${color.r}, ${color.g}, ${color.b}, 0.3)`);
  torsoGrad.addColorStop(1, `rgba(${color.r}, ${color.g}, ${color.b}, 0.08)`);
  ctx.fillStyle = torsoGrad;
  ctx.fill();
  
  const armAlpha = 0.2;
  ctx.strokeStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${armAlpha})`;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  
  ctx.beginPath();
  ctx.moveTo(leanX * 0.2 - 18, -58 + b * 0.2);
  if (isDeep) {
    ctx.quadraticCurveTo(-30 + leanX, -35 + b, leanX * 0.4 - 5, -40 + b);
  } else {
    ctx.quadraticCurveTo(-25 + leanX, -30 + b, leanX * 0.3 + 8, -35 + b);
  }
  ctx.stroke();
  
  ctx.beginPath();
  ctx.moveTo(leanX * 0.2 + 18, -58 + b * 0.2);
  if (isDeep) {
    ctx.quadraticCurveTo(25 + leanX, -40 + b, 20 + leanX, -30 + b);
  } else {
    ctx.quadraticCurveTo(20 + leanX, -30 + b, leanX * 0.3 - 5, -32 + b);
  }
  ctx.stroke();
  
  ctx.beginPath();
  ctx.moveTo(leanX * 0.3 - 10, -5);
  ctx.lineTo(-15, 30);
  ctx.lineTo(-20, 55);
  ctx.strokeStyle = `rgba(${color.r}, ${color.g}, ${color.b}, 0.15)`;
  ctx.lineWidth = 5;
  ctx.stroke();
  
  ctx.beginPath();
  ctx.moveTo(leanX * 0.3 + 10, -5);
  ctx.lineTo(12, 30);
  ctx.lineTo(15, 55);
  ctx.stroke();
  
  const heartbeat = 0.15 + 0.1 * Math.sin(breathe * 2.5);
  const coreGrad = ctx.createRadialGradient(leanX * 0.3, -42, 0, leanX * 0.3, -42, 20);
  coreGrad.addColorStop(0, `rgba(${color.r}, ${color.g}, ${color.b}, ${heartbeat})`);
  coreGrad.addColorStop(1, `rgba(${color.r}, ${color.g}, ${color.b}, 0)`);
  ctx.beginPath();
  ctx.arc(leanX * 0.3, -42, 20, 0, Math.PI * 2);
  ctx.fillStyle = coreGrad;
  ctx.fill();
  
  if (isDeep) {
    for (let i = 0; i < 5; i++) {
      const streamY = -80 + ((breathe * 30 + i * 25) % 120);
      const streamAlpha = 0.1 * Math.sin(breathe + i);
      if (streamAlpha > 0) {
        ctx.beginPath();
        ctx.arc(leanX * 0.3 + Math.sin(streamY * 0.1) * 8, streamY, 1, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 200, 150, ${streamAlpha})`;
        ctx.fill();
      }
    }
  }
  ctx.restore();
}

function drawDocument(ctx, x, y, t) {
  const glow = 0.4 + 0.15 * Math.sin(t * 0.8);
  const docGlow = ctx.createRadialGradient(x, y, 0, x, y, 60);
  docGlow.addColorStop(0, `rgba(${COPPER.r}, ${COPPER.g}, ${COPPER.b}, ${glow * 0.3})`);
  docGlow.addColorStop(0.5, `rgba(${COPPER.r}, ${COPPER.g}, ${COPPER.b}, ${glow * 0.08})`);
  docGlow.addColorStop(1, `rgba(${COPPER.r}, ${COPPER.g}, ${COPPER.b}, 0)`);
  ctx.beginPath();
  ctx.arc(x, y, 60, 0, Math.PI * 2);
  ctx.fillStyle = docGlow;
  ctx.fill();
  
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(Math.sin(t * 0.3) * 0.02);
  const dw = 22, dh = 28;
  ctx.beginPath();
  ctx.rect(-dw/2, -dh/2, dw, dh);
  const docGrad = ctx.createLinearGradient(-dw/2, -dh/2, dw/2, dh/2);
  docGrad.addColorStop(0, `rgba(${COPPER.r}, ${COPPER.g}, ${COPPER.b}, ${glow * 0.5})`);
  docGrad.addColorStop(1, `rgba(${DEEP_AMBER.r}, ${DEEP_AMBER.g}, ${DEEP_AMBER.b}, ${glow * 0.3})`);
  ctx.fillStyle = docGrad;
  ctx.fill();
  ctx.strokeStyle = `rgba(${COPPER.r}, ${COPPER.g}, ${COPPER.b}, ${glow * 0.4})`;
  ctx.lineWidth = 0.5;
  ctx.stroke();
  
  for (let i = 0; i < 6; i++) {
    const lw = 10 + Math.sin(i * 1.5) * 4;
    ctx.beginPath();
    ctx.moveTo(-8, -10 + i * 4);
    ctx.lineTo(-8 + lw, -10 + i * 4);
    ctx.strokeStyle = `rgba(255, 230, 200, ${glow * 0.2})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  
  for (let i = 0; i < 7; i++) {
    const angle = -Math.PI/2 + (i - 3) * 0.15 + Math.sin(t * 0.5 + i) * 0.05;
    const rayLen = 30 + Math.sin(t + i * 0.7) * 10;
    const rayGrad = ctx.createLinearGradient(0, 0, Math.cos(angle) * rayLen, Math.sin(angle) * rayLen);
    rayGrad.addColorStop(0, `rgba(${COPPER.r}, ${COPPER.g}, ${COPPER.b}, ${glow * 0.15})`);
    rayGrad.addColorStop(1, `rgba(${COPPER.r}, ${COPPER.g}, ${COPPER.b}, 0)`);
    ctx.beginPath();
    ctx.moveTo(0, -dh/2);
    ctx.lineTo(Math.cos(angle) * rayLen, -dh/2 + Math.sin(angle) * rayLen);
    ctx.strokeStyle = rayGrad;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
  ctx.restore();
}

function drawHumanObserver(ctx, x, y, t) {
  ctx.save();
  ctx.translate(x, y);
  const alpha = 0.12 + 0.03 * Math.sin(t * 0.5);
  ctx.fillStyle = `rgba(20, 20, 30, ${alpha + 0.4})`;
  
  ctx.beginPath();
  ctx.arc(0, -125, 16, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.beginPath();
  ctx.moveTo(-20, -109);
  ctx.quadraticCurveTo(0, -80, -16, -40);
  ctx.lineTo(16, -40);
  ctx.quadraticCurveTo(0, -80, 20, -109);
  ctx.closePath();
  ctx.fill();
  
  ctx.beginPath();
  ctx.moveTo(18, -100);
  ctx.quadraticCurveTo(30, -80, 25, -65);
  ctx.lineWidth = 5;
  ctx.strokeStyle = `rgba(20, 20, 30, ${alpha + 0.35})`;
  ctx.stroke();
  
  ctx.fillStyle = `rgba(60, 60, 80, ${alpha + 0.3})`;
  ctx.fillRect(21, -68, 8, 14);
  const phoneGlow = ctx.createRadialGradient(25, -61, 0, 25, -61, 15);
  phoneGlow.addColorStop(0, `rgba(${COLD_BLUE.r}, ${COLD_BLUE.g}, ${COLD_BLUE.b}, 0.08)`);
  phoneGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(25, -61, 15, 0, Math.PI * 2);
  ctx.fillStyle = phoneGlow;
  ctx.fill();
  
  ctx.beginPath();
  ctx.moveTo(-8, -40);
  ctx.lineTo(-12, 20);
  ctx.moveTo(8, -40);
  ctx.lineTo(12, 20);
  ctx.strokeStyle = `rgba(20, 20, 30, ${alpha + 0.3})`;
  ctx.lineWidth = 6;
  ctx.stroke();
  ctx.restore();
}

function drawTable(ctx, x, y, w) {
  ctx.beginPath();
  ctx.moveTo(x - w/2, y);
  ctx.lineTo(x + w/2, y);
  const tableGrad = ctx.createLinearGradient(x - w/2, y, x + w/2, y);
  tableGrad.addColorStop(0, `rgba(${COPPER.r}, ${COPPER.g}, ${COPPER.b}, 0)`);
  tableGrad.addColorStop(0.3, `rgba(${COPPER.r}, ${COPPER.g}, ${COPPER.b}, 0.12)`);
  tableGrad.addColorStop(0.5, `rgba(${COPPER.r}, ${COPPER.g}, ${COPPER.b}, 0.18)`);
  tableGrad.addColorStop(0.7, `rgba(${COPPER.r}, ${COPPER.g}, ${COPPER.b}, 0.12)`);
  tableGrad.addColorStop(1, `rgba(${COPPER.r}, ${COPPER.g}, ${COPPER.b}, 0)`);
  ctx.strokeStyle = tableGrad;
  ctx.lineWidth = 1;
  ctx.stroke();
  const reflGrad = ctx.createLinearGradient(x, y, x, y + 30);
  reflGrad.addColorStop(0, `rgba(${COPPER.r}, ${COPPER.g}, ${COPPER.b}, 0.04)`);
  reflGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = reflGrad;
  ctx.fillRect(x - w/2, y, w, 30);
}

function drawConnections(ctx, fragments, t) {
  for (let i = 0; i < fragments.length; i++) {
    for (let j = i + 1; j < fragments.length; j++) {
      if (Math.random() > 0.992) continue;
      const fi = fragments[i];
      const fj = fragments[j];
      const xi = fi.cx + Math.cos(fi.angle) * fi.radius;
      const yi = fi.cy + Math.sin(fi.angle) * (fi.radius * 0.6);
      const xj = fj.cx + Math.cos(fj.angle) * fj.radius;
      const yj = fj.cy + Math.sin(fj.angle) * (fj.radius * 0.6);
      const dist = Math.hypot(xi - xj, yi - yj);
      if (dist < 80 && fi.isMemory && fj.isMemory) {
        const alpha = 0.04 * (1 - dist / 80);
        ctx.beginPath();
        ctx.moveTo(xi, yi);
        ctx.lineTo(xj, yj);
        ctx.strokeStyle = `rgba(${COPPER.r}, ${COPPER.g}, ${COPPER.b}, ${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
}

function initFragments() {
  const centerX = W / 2;
  const centerY = H * 0.35;
  const figureLeftX = centerX - 120;
  contextFragments.length = 0;
  for (let i = 0; i < 80; i++) {
    contextFragments.push(new ContextFragment(figureLeftX, centerY - 10));
  }
  ambientDust.length = 0;
  for (let i = 0; i < 60; i++) {
    ambientDust.push(new Dust());
  }
}

resize();

function render() {
  time += 0.016;
  
  const centerX = W / 2;
  const centerY = H * 0.35;
  const figureLeftX = centerX - 120;
  const figureRightX = centerX + 120;
  const figureY = centerY;
  
  ctx.fillStyle = `rgb(${VOID.r}, ${VOID.g}, ${VOID.b})`;
  ctx.fillRect(0, 0, W, H);
  
  const vignette = ctx.createRadialGradient(W/2, H/2, H * 0.3, W/2, H/2, H * 0.8);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);
  
  const ambientGrad = ctx.createRadialGradient(W/2, H * 0.15, 0, W/2, H * 0.15, H * 0.7);
  ambientGrad.addColorStop(0, `rgba(${DEEP_AMBER.r}, ${DEEP_AMBER.g}, ${DEEP_AMBER.b}, 0.04)`);
  ambientGrad.addColorStop(0.5, `rgba(${COPPER.r}, ${COPPER.g}, ${COPPER.b}, 0.015)`);
  ambientGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = ambientGrad;
  ctx.fillRect(0, 0, W, H);
  
  ambientDust.forEach(d => { d.update(); d.draw(ctx); });
  drawConnections(ctx, contextFragments, time);
  contextFragments.forEach(f => { f.update(); f.draw(ctx, time); });
  drawTable(ctx, centerX, figureY + 55, 300);
  drawDocument(ctx, centerX, figureY + 40, time);
  drawHumanObserver(ctx, centerX, figureY + 10, time);
  drawFigure(ctx, figureLeftX, figureY, 1.3, COPPER, 2, time * 0.8, true);
  drawFigure(ctx, figureRightX, figureY, 1.3, COLD_BLUE, -1.5, time * 0.6, false);
  
  const floorGrad = ctx.createLinearGradient(0, H * 0.75, 0, H);
  floorGrad.addColorStop(0, 'rgba(0,0,0,0)');
  floorGrad.addColorStop(1, `rgba(${COPPER.r}, ${COPPER.g}, ${COPPER.b}, 0.02)`);
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, H * 0.75, W, H * 0.25);
  
  requestAnimationFrame(render);
}

setTimeout(render, 500);
</script>
</body>
